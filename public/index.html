<!DOCTYPE html>
<html>
<head>
  <title>MThicMining</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(#020617, #0f172a);
      color: white;
    }

    .container {
      padding: 15px;
    }

    .top {
      text-align: center;
      margin-top: 10px;
    }

    .balance {
      font-size: 28px;
      font-weight: bold;
    }

    .sub {
      color: #94a3b8;
      font-size: 12px;
    }

    .card {
      background: linear-gradient(45deg, #1e293b, #334155);
      border-radius: 15px;
      padding: 15px;
      margin-top: 20px;
      box-shadow: 0 0 20px #00000050;
    }

    .lottery {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-yellow {
      background: gold;
      color: black;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: bold;
    }

    .center-box {
      margin: 30px auto;
      width: 120px;
      height: 120px;
      border-radius: 20px;
      background: #cbd5e1;
    }

    .pending {
      text-align: center;
      margin-top: 10px;
    }

    .pending h1 {
      color: #22c55e;
      font-size: 40px;
      margin: 5px;
    }

    .progress {
      height: 8px;
      background: #1e293b;
      border-radius: 10px;
      margin-top: 10px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #22c55e;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
    }

    .claim {
      background: #22c55e;
      color: black;
    }

    .upgrade {
      background: #334155;
      color: white;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #020617;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      font-size: 12px;
      color: #94a3b8;
    }

    .nav div {
      text-align: center;
    }

    .active {
      color: orange;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top">
    <div class="balance">0 MTC</div>
    <div class="sub">~ 0.00 $ | 0.00 TON</div>
    <div class="sub">LEVEL 1 | PER DAY 500</div>
  </div>

  <!-- LOTTERY -->
  <div class="card lottery">
    <div>
      <b>Reward Token</b><br>
      <span class="sub">Pre Rgister</span>
    </div>
    <button class="btn-yellow">BOX</button>
  </div>

  <!-- CENTER ICON -->
  <div class="center-box"></div>

  <!-- PENDING -->
  <div class="pending">
    <div class="sub">PENDING REWARDS</div>
    <h1 id="reward">0.00</h1>
  </div>

  <!-- STORAGE -->
  <div class="sub">STORAGE</div>
  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <!-- BUTTON -->
  <div class="row">
    <button class="btn claim" onclick="claim()">CLAIM</button>
    <button class="btn upgrade">UPGRADE</button>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <div class="active">Home</div>
  <div>Lve</div>
  <div>Cool</div>
  <div>Games</div>
  <div>Tasks</div>
</div>

<script>
  let reward = 0;
  let max = 100;

  // idle mining (mirip verox)
  setInterval(() => {
    if (reward < max) {
      reward += 1;
      updateUI();
    }
  }, 2000);

  function claim() {
    alert("Reward di-claim!");
    reward = 0;
    updateUI();
  }

  function updateUI() {
    document.getElementById("reward").innerText = reward.toFixed(2);
    document.getElementById("bar").style.width = (reward / max * 100) + "%";
  }
</script>

</body>
</html>
